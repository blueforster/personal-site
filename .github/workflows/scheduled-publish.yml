name: Scheduled Publish

on:
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduled publish
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/schedule/trigger" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               -H "Content-Type: application/json"
